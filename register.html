<section class="ftco-section bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-3 col-lg-6">
        <div class="bg-white p-5 shadow rounded">

         <h3 class="mb-4 text-center font-weight-bold">Tạo Tài Khoản</h3>
          <form action="index.html" method="post">

            <!-- HỌ & TÊN -->
            <div class="form-row">
              <div class="form-group col-md-6">
                <label>Họ:</label>
                <input type="text" class="form-control" required>
              </div>
              <div class="form-group col-md-6">
                <label>Tên:</label>
                <input type="text" class="form-control" required>
              </div>
            </div>
            <!-- EMAIL -->
            <div class="form-group">
              <label>Email:</label>
              <input type="email" class="form-control" placeholder="Nhập email" required>
            </div>

            <!-- SỐ ĐIỆN THOẠI -->
            <div class="form-group">
              <label>Số điện thoại:</label>
              <input type="text" class="form-control" placeholder="Nhập số điện thoại" required>
            </div>

            <!-- MẬT KHẨU -->
            <div class="form-group position-relative">
              <label>Mật khẩu:</label>
              <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
              <span class="fa fa-eye toggle-password"
                    style="position:absolute; top:70%; right:15px; cursor:pointer;"></span>
            </div>

            <!-- XÁC NHẬN MẬT KHẨU -->
            <div class="form-group position-relative">
              <label>Xác nhận mật khẩu:</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
              <span class="fa fa-eye toggle-password2"
                    style="position:absolute; top:70%; right:15px; cursor:pointer;"></span>
            </div>

            <!-- CHECKBOX -->
            <div class="form-group">
              <input type="checkbox" required>
              Tôi đồng ý với 
              <a href="#">Điều khoản dịch vụ</a> và 
              <a href="#">Chính sách bảo mật</a>
            </div>

            <!-- BUTTON -->
            <div class="form-group text-center">
             <button type="submit" class="btn btn-primary py-3 px-5 btn-block">
                Đăng Ký
              </button>
            </div>

            <p class="text-center">
              Bạn đã có tài khoản? 
              <a href="login.html" class="text-danger">
                Nhấn vào đây để đăng nhập
              </a>
            </p>

          </form>

        </div>
      </div>

  <script>
$(document).ready(function() {

  $(".toggle-password").click(function() {
    var input = $("#password");
    input.attr("type", input.attr("type") === "password" ? "text" : "password");
    $(this).toggleClass("fa-eye fa-eye-slash");
  });

  $(".toggle-password2").click(function() {
    var input = $("#confirmPassword");
    input.attr("type", input.attr("type") === "password" ? "text" : "password");
    $(this).toggleClass("fa-eye fa-eye-slash");
  });

});
</script>
    <script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault(); 
  alert("Đăng ký thành công! Đang chuyển sang đăng nhập...");
  
  setTimeout(function() {
    window.location.href = "login.html";
  }, 1500);
});
</script>
