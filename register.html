<section class="ftco-section bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-3 col-lg-6">
        <div class="bg-white p-5 shadow rounded">

         <h3 class="mb-4 text-center font-weight-bold">Tạo Tài Khoản</h3>
          <form action="index.html" method="post" id="register-form">

            <div class="form-row">
              <div class="form-group col-md-6">
                <label>Họ:</label>
                <input type="text" id="firstName" class="form-control" required >
              </div>
              <div class="form-group col-md-6">
                <label>Tên:</label>
                <input type="text" id="reg-name" class="form-control" required>
              </div>
            </div>

            <div class="form-group">
              <label>Email*</label>
              <input type="email" id="reg-email"  class="form-control" placeholder="Nhập email" required>
              <small id="err-email" class="text-danger" style="display: none; font-weight: 500;"></small>
            </div>
            

            <div class="form-group mb-3">
              <label for="reg-phone" style="font-weight: 600;">Số điện thoại *</label>
              <input type="text" id="reg-phone" class="form-control" placeholder="098..." required>
              <small id="err-phone" class="text-danger" style="display: none; font-weight: 500;"></small>
          </div>

            <div class="form-group position-relative">
              <label>Mật khẩu*</label>
              <input type="password" class="form-control" id="password" placeholder="Tạo mật khẩu" required>
              <span class="fa fa-eye toggle-password"
                    style="position:absolute; top:70%; right:15px; cursor:pointer;"></span>
              <small id="err-password" class="text-danger" style="display: none; font-weight: 500;"></small>
            </div>
            

            <div class="form-group position-relative">
              <label>Xác nhận mật khẩu*</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
              <span class="fa fa-eye toggle-password2"
                    style="position:absolute; top:70%; right:15px; cursor:pointer;"></span>
              <small id="err-confirmPassword" class="text-danger" style="display: none; font-weight: 500;"></small>
            </div>

            <div class="form-group">
              <input type="checkbox" required>
              Tôi đồng ý với 
              <a href="#">Điều khoản dịch vụ</a> và 
              <a href="#">Chính sách bảo mật</a>
            </div>

            <div class="form-group text-center">
             <button type="submit" class="btn text-white py-3 px-5 btn-block" id="btn-register" style="background-color: #dc3545; border-color: #dc3545;" disabled>
                Đăng Ký
              </button>
            </div>

            <p class="text-center">
              Bạn đã có tài khoản? 
              <a href="login.html" class="text-danger">
                Nhấn vào đây để đăng nhập
              </a>
            </p>

          </form>

        </div>
      </div>
    </div>
  </div>
</section>
