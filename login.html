<section class="ftco-section bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="bg-white p-5 shadow rounded">

          <div id="login-container">
              <h3 class="mb-4 text-center">Đăng Nhập</h3>
              <form id="login-form">
                <div class="form-group">
                  <label>Email đăng nhập</label>
                  <input type="email" id="login-email" class="form-control" placeholder="Nhập email" required>
                </div>
                <div class="form-group">
                  <label>Mật khẩu</label>
                  <div class="position-relative">
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                    <span toggle="#password" class="fa fa-fw fa-eye field-icon toggle-password" style="position:absolute; top:50%; right:15px; transform:translateY(-50%); cursor:pointer;"></span>
                  </div>
                </div>
                <div class="form-group d-flex justify-content-between align-items-center">
                 <div class="checkbox-wrap">
                      <input type="checkbox" id="rememberMe">
                      <label for="rememberMe" style="margin-left: 5px;"> Nhớ mật khẩu</label>
                  </div>
                  <a href="javascript:void(0)" class="text-danger" onclick="toggleForgotPassword(true)">Quên mật khẩu?</a>
                </div>
                <div class="form-group">
                  <button type="submit" class="btn btn-primary py-3 px-5 btn-block">Đăng nhập</button>
                </div>
                <p class="text-center">
                  Bạn chưa có tài khoản? <a href="register.html" class="text-primary">Đăng ký ngay!</a>
                </p>
              </form>
          </div>

          <div id="forgot-password-container" class="d-none">
              <h3 class="mb-4 text-center">Khôi Phục Mật Khẩu</h3>

              <div id="forgot-step-1">
                  <p class="text-muted text-center" style="font-size: 14px;">Nhập email đăng ký để nhận mã PIN.</p>
                  <div class="form-group">
                      <input type="email" id="email-forgot" class="form-control" placeholder="Nhập Email của bạn">
                  </div>
                  <button type="button" id="btn-send-pin" class="btn btn-primary btn-block py-2" style="background-color: #82ae46; border: none;" onclick="sendPinCode()">Gửi Mã PIN</button>
              </div>

              <div id="forgot-step-2" class="d-none">
                  <p class="text-muted text-center" style="font-size: 14px;">Mã PIN gồm 6 số đã được gửi tới email của bạn.</p>
                  <div class="form-group">
                      <input type="text" id="pin-input" class="form-control text-center font-weight-bold" placeholder="------" maxlength="6" style="letter-spacing: 10px; font-size: 20px;">
                  </div>
                  <button type="button" class="btn btn-primary btn-block py-2 mb-2" style="background-color: #82ae46; border: none;" onclick="verifyPinCode()">Xác Thực</button>
              </div>

              <div id="forgot-step-3" class="d-none">
                  <p class="text-muted text-center" style="font-size: 14px;">Nhập mật khẩu mới cho tài khoản của bạn.</p>
                  <div class="form-group">
                      <input type="password" id="new-password" class="form-control" placeholder="Mật khẩu mới (ít nhất 6 ký tự)">
                  </div>
                  <button type="button" id="btn-save-pass" class="btn btn-primary btn-block py-2 mb-2" style="background-color: #82ae46; border: none;" onclick="saveNewPassword()">Lưu Mật Khẩu Mới</button>
              </div>

              <div class="text-center mt-3">
                  <a href="javascript:void(0)" onclick="toggleForgotPassword(false)" class="text-secondary"><i class="fa fa-arrow-left"></i> Quay lại đăng nhập</a>
              </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
